services:
  postgres:
    image: postgres:15
    container_name: padel-db
    environment:
      POSTGRES_DB: padelService
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
    ports:
      - "5440:5432"
    volumes:
      - padel-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel -d padelService"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  padel-db-data: